<!DOCTYPE html>
<html>
<head>
    <title>Chris Comfort</title>
    <style>
        body {
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .gallery {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .randomized {
            position: absolute;
            max-width: 200px;
            max-height: 200px;
            transition: transform 2s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="gallery" id="gallery"></div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const images = [
                "images/IMG_2028.PNG", "images/IMG_2030.PNG", "images/IMG_2039.PNG", "images/IMG_4469.PNG",
                 "images/ed3.png", "images/Untitled_1.14.1.JPEG", "images/Untitled_2.13.1.JPEG", "images/mvg_1.3.6.jpg", 
                 "images/untitled_1.1.2.jpg", "images/ed5.png", "images/onaw1.png", "images/onaw2.png", "images/jade1.png", 
                 "images/Untitled_1.3.3.jpg", "images/Untitled_1.3.8.jpg", "images/Untitled_1.36.1.JPEG", "images/1.6.1.jpg" 
            ];
            
            const gallery = document.getElementById("gallery");
            
            images.forEach(src => {
                let img = document.createElement("img");
                img.src = src;
                img.classList.add("randomized");
                
                img.style.left = Math.random() * (window.innerWidth - 200) + "px";
                img.style.top = Math.random() * (window.innerHeight - 200) + "px";
                

                
                gallery.appendChild(img);
            });
        });
    </script>
</body>
</html>
